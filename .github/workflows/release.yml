name: Build and Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      pref_codes:
        description: "対象の都道府県コード (カンマ区切り, 例: 13,27 / 空=全都道府県)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 対象都道府県リストを生成 ─────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pref_matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate pref matrix
        id: gen
        run: |
          INPUT="${{ github.event.inputs.pref_codes }}"
          if [ -z "$INPUT" ]; then
            CODES=$(seq -w 1 47 | xargs printf '%02d ')
          else
            CODES=$(echo "$INPUT" | tr ',' ' ')
          fi
          JSON=$(echo $CODES | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "matrix={\"pref_code\": $JSON}" >> $GITHUB_OUTPUT

  # ── 都道府県ごとにビルド ──────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.pref_matrix) }}
      max-parallel: 8
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ${{ matrix.pref_code }}
        run: python3 scripts/build.py --pref "${{ matrix.pref_code }}" --out dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pref-${{ matrix.pref_code }}
          path: dist/
          retention-days: 1

  # ── 変更があった都道府県のみリリースを更新 ─────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pref-*
          path: dist/
          merge-multiple: true

      - name: Update per-prefecture releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          dist = Path("dist")
          repo = os.environ["GITHUB_REPOSITORY"]

          # 現在の sha256sums.json をロード（リポジトリの main ブランチから）
          current_sums_path = Path("sha256sums.json")
          current_sums = {}
          if current_sums_path.exists():
              current_sums = json.loads(current_sums_path.read_text()).get("files", {})

          updated = []

          for meta_path in sorted(dist.glob("*.meta.json")):
              meta       = json.loads(meta_path.read_text())
              pref_code  = meta["pref_code"]
              pref_name  = meta["pref_name_en"]
              new_sha256 = meta["sha256"]
              parts      = meta["parts"]
              size_mb    = meta["size"] / 1024 / 1024

              # SHA256 比較 — 変化なしならスキップ
              if current_sums.get(pref_code, {}).get("sha256") == new_sha256:
                  print(f"[{pref_code}] No change, skipping.")
                  continue

              print(f"[{pref_code}] Changed ({new_sha256[:12]}...), updating release ...")

              tag      = f"pref-{pref_code}"
              title    = f"{pref_code}_{pref_name}"
              part_str = "\n".join(f"- `{p}`" for p in parts)
              if len(parts) == 1:
                  dl_cmd = f"curl -fSL -O https://github.com/{repo}/releases/download/{tag}/{parts[0]}\ngunzip {parts[0]}"
              else:
                  dl_cmd = "\n".join(f"curl -fSL -O https://github.com/{repo}/releases/download/{tag}/{p}" for p in parts)
                  dl_cmd += f"\ncat {pref_code}_{pref_name}.db.gz.* > {pref_code}_{pref_name}.db.gz && gunzip {pref_code}_{pref_name}.db.gz"

              notes = f"""## {pref_code}_{pref_name}

**SHA256 (assembled gz):** `{new_sha256}`
**Size:** {size_mb:.1f} MB

### ダウンロード

```bash
{dl_cmd}
```

### ファイル

{part_str}

---
ソース: [デジタル庁 アドレス・ベース・レジストリ](https://www.digital.go.jp/policies/base_registry_address)"""

              # 既存リリースを削除
              subprocess.run(["gh", "release", "delete", tag, "--yes", "--cleanup-tag"],
                             capture_output=True)

              # 新規リリース作成
              assets = [str(dist / p) for p in parts]
              result = subprocess.run(
                  ["gh", "release", "create", tag, *assets,
                   "--title", title, "--notes", notes,
                   "--repo", repo],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"  ERROR: {result.stderr}", file=sys.stderr)
              else:
                  print(f"  Released: {result.stdout.strip()}")
                  updated.append(pref_code)

          print(f"\nUpdated {len(updated)} prefectures: {updated}")
          PYEOF

      - name: Generate updated sha256sums.json
        run: |
          python3 scripts/checksums.py \
            --dist dist/ \
            --out  sha256sums.json \
            --merge sha256sums.json

      - name: Commit sha256sums.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sha256sums.json
          git diff --cached --quiet \
            && echo "sha256sums.json unchanged, nothing to commit." \
            || git commit -m "chore: update sha256sums.json [skip ci]" && git push
