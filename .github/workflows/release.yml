name: Build and Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      pref_codes:
        description: "対象の都道府県コード (カンマ区切り, 例: 13,27 / 空=全都道府県)"
        required: false
        type: string
      force:
        description: "変更がなくても強制リリース"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [build]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 対象都道府県リストを生成 ─────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pref_matrix: ${{ steps.gen.outputs.matrix }}
      tag:         ${{ steps.gen.outputs.tag }}
    steps:
      - name: Generate matrix and tag
        id: gen
        run: |
          # workflow_dispatch と repository_dispatch の両方に対応
          INPUT="${{ github.event.inputs.pref_codes || github.event.client_payload.pref_codes }}"
          if [ -z "$INPUT" ]; then
            CODES=$(seq -w 1 47 | xargs printf '%02d ')
          else
            CODES=$(echo "$INPUT" | tr ',' ' ')
          fi
          JSON=$(echo $CODES | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "matrix={\"pref_code\": $JSON}" >> $GITHUB_OUTPUT
          echo "tag=v$(date -u '+%Y.%m')"      >> $GITHUB_OUTPUT

  # ── 都道府県ごとにビルド（並列） ──────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.pref_matrix) }}
      max-parallel: 8
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ${{ matrix.pref_code }}
        run: python3 scripts/build.py --pref "${{ matrix.pref_code }}" --out dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pref-${{ matrix.pref_code }}
          path: dist/
          retention-days: 1

  # ── 全都道府県をまとめてリリース ──────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pref-*
          path: dist/
          merge-multiple: true

      - name: Generate sha256sums.json
        run: |
          python3 scripts/checksums.py --dist dist/ --out dist/sha256sums.json
          echo "--- built sha256sums.json ---"
          cat dist/sha256sums.json

      - name: Check for changes vs latest release
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORCE="${{ github.event.inputs.force || github.event.client_payload.force }}"

          # 最新リリースの sha256sums.json を取得
          gh release download --repo ${{ github.repository }} \
            --pattern sha256sums.json \
            --output prev_sha256sums.json \
            --clobber 2>/dev/null || echo '{"files":{}}' > prev_sha256sums.json

          # 差分チェック
          if [ "$FORCE" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Force release requested."
          elif diff -q prev_sha256sums.json dist/sha256sums.json > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected. Skipping release."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            diff prev_sha256sums.json dist/sha256sums.json || true
          fi

      - name: Create GitHub Release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          DATE=$(date -u '+%Y-%m-%d')

          # 同名タグがあれば削除
          gh release delete "$TAG" --yes --cleanup-tag \
            --repo ${{ github.repository }} 2>/dev/null || true

          # リリースノート生成
          python3 - <<'PYEOF'
          import json
          from pathlib import Path

          sums = json.loads(Path("dist/sha256sums.json").read_text())
          lines = []
          for code, info in sorted(sums["files"].items()):
              parts = info["parts"]
              size_mb = info["size"] / 1024 / 1024
              if len(parts) == 1:
                  files_str = f"`{parts[0]}`"
              else:
                  files_str = " ".join(f"`{p}`" for p in parts)
              lines.append(f"| {info['pref_ja']} | {files_str} | {size_mb:.0f} MB | `{info['sha256'][:16]}...` |")

          notes = f"""## デジタル庁 アドレス・ベース・レジストリ SQLite 版

**ビルド日:** {Path("/dev/stdin").read_text() if False else __import__('subprocess').check_output(['date', '-u', '+%Y-%m-%d']).decode().strip()}

### ダウンロード方法

```bash
# 1. チェックサムファイルを取得
curl -fSL -O https://github.com/${{ github.repository }}/releases/latest/download/sha256sums.json

# 2. 目的の都道府県を確認（例: 東京都 13）
jq '.files["13"]' sha256sums.json

# 3. ダウンロード（単一ファイルの場合）
curl -fSL -O https://github.com/${{ github.repository }}/releases/latest/download/13_tokyo.db.gz
gunzip 13_tokyo.db.gz

# 4. 分割ファイルの場合（parts が複数のとき）
# parts に列挙されているファイルをすべてダウンロードして結合
curl -fSL -O .../13_tokyo.db.gz.001
curl -fSL -O .../13_tokyo.db.gz.002
cat 13_tokyo.db.gz.* > 13_tokyo.db.gz && gunzip 13_tokyo.db.gz
```

### ローカルファイルの更新チェック

```bash
# ローカルにある gz の SHA256 を確認
sha256sum 13_tokyo.db.gz

# リモートの期待値と比較
jq -r '.files["13"].sha256' sha256sums.json
```

### 都道府県別ファイル一覧

| 都道府県 | ファイル | サイズ | SHA256 (先頭16桁) |
|---|---|---|---|
""" + "\n".join(lines)

          Path("release_notes.md").write_text(notes)
          PYEOF

          gh release create "$TAG" dist/*.db.gz* dist/sha256sums.json \
            --repo ${{ github.repository }} \
            --title "アドレス・ベース・レジストリ $TAG" \
            --notes-file release_notes.md

      - name: Commit sha256sums.json to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/sha256sums.json sha256sums.json
          git add sha256sums.json
          git diff --cached --quiet \
            && echo "No commit needed." \
            || (git commit -m "chore: update sha256sums.json [skip ci]" && git push)
