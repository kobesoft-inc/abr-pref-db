name: Build and Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      pref_codes:
        description: "対象の都道府県コード (カンマ区切り, 例: 13,27,01 / 空=全都道府県)"
        required: false
        type: string
      include_parcel:
        description: "地番データを含める"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

# 同一月のワークフローが重複して走らないようにする
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 都道府県コードのリストを生成 ─────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pref_matrix: ${{ steps.prefs.outputs.matrix }}
      tag:         ${{ steps.prefs.outputs.tag }}
      parcel_flag: ${{ steps.prefs.outputs.parcel_flag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate pref matrix
        id: prefs
        run: |
          INPUT="${{ github.event.inputs.pref_codes }}"
          PARCEL="${{ github.event.inputs.include_parcel }}"

          # デフォルトは全都道府県
          if [ -z "$INPUT" ]; then
            CODES=$(seq -w 1 47 | xargs printf '%02d ')
          else
            CODES=$(echo "$INPUT" | tr ',' ' ')
          fi

          # JSON 配列に変換
          JSON=$(echo $CODES | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "matrix={\"pref_code\": $JSON}" >> $GITHUB_OUTPUT
          echo "tag=v$(date -u '+%Y.%m')"      >> $GITHUB_OUTPUT

          if [ "$PARCEL" = "true" ]; then
            echo "parcel_flag=" >> $GITHUB_OUTPUT
          else
            echo "parcel_flag=--no-parcel" >> $GITHUB_OUTPUT
          fi

  # ── 都道府県ごとに DB をビルド ────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.pref_matrix) }}
      max-parallel: 8
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ${{ matrix.pref_code }}
        run: |
          python3 scripts/build.py \
            --pref "${{ matrix.pref_code }}" \
            ${{ needs.prepare.outputs.parcel_flag }} \
            --out dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pref-${{ matrix.pref_code }}
          path: dist/*.db.gz
          retention-days: 1

  # ── SHA256 計算 & GitHub Release 作成 ─────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pref-*
          path: dist/
          merge-multiple: true

      - name: List built files
        run: ls -lh dist/

      - name: Generate sha256sums.json
        run: python3 scripts/checksums.py --dist dist/ --out dist/sha256sums.json

      - name: Delete existing release if same tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Deleting existing release $TAG ..."
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          DATE=$(date -u '+%Y-%m-%d')
          FILE_COUNT=$(ls dist/*.db.gz | wc -l | tr -d ' ')

          gh release create "$TAG" dist/*.db.gz dist/sha256sums.json \
            --title "アドレス・ベース・レジストリ SQLite ${TAG}" \
            --notes "## デジタル庁 アドレス・ベース・レジストリ — 都道府県別 SQLite DB

**ビルド日:** ${DATE}
**収録都道府県数:** ${FILE_COUNT}

### ダウンロード

各都道府県の \`.db.gz\` ファイルと、全ファイルの SHA256 チェックサムを収録した \`sha256sums.json\` があります。

\`\`\`bash
# 東京都の場合
curl -fSL -O https://github.com/kobesoft-inc/abr-pref-db/releases/latest/download/13_tokyo.db.gz
gunzip 13_tokyo.db.gz

# 更新チェック: sha256sums.json をダウンロードしてローカルと比較
curl -fSL https://github.com/kobesoft-inc/abr-pref-db/releases/latest/download/sha256sums.json
\`\`\`

### スキーマ

\`\`\`
city      市区町村マスター  (lat/lon あり)
town      町字マスター      (lat/lon あり)
rsdt_blk  住居表示-街区     (lat/lon あり)
rsdt_dsp  住居表示-住居     (lat/lon あり)
parcel    地番マスター      (lat/lon あり, オプション)
meta      ビルド情報
\`\`\`

---
ソース: [デジタル庁 アドレス・ベース・レジストリ](https://www.digital.go.jp/policies/base_registry_address)"

      # sha256sums.json を main ブランチにもコミット (安定 URL として提供)
      - name: Commit sha256sums.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/sha256sums.json sha256sums.json
          git add sha256sums.json
          git diff --cached --quiet || git commit -m "chore: update sha256sums.json [skip ci]"
          git push
